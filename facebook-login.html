<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Login</title>

    <link rel="stylesheet" href="assets/css/facebook-login.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

    <!-- Left Side -->

    <div class="left-section">

        <img src="assets/images/FB login image.webp" class="left-image" alt="Facebook">

    </div>

    <!-- Right Side -->

    <div class="right-section">

        <div class="login-box">

            <h2>Log in to Facebook</h2>

            <form>

                <input
                type="text"
                placeholder="Email address or mobile number"
                required>

                <input
                type="password"
                placeholder="Password"
                required>

                <button class="login-btn">
                    Log in
                </button>

                <a href="#" class="forgot">
                    Forgotten password?
                </a>

                <button class="create-btn">
                    Create new account
                </button>

            </form>

            <div class="meta">
                <img src="assets/images/meta logo.jpg" <alt></alt>Meta</alt>
            </div>

        </div>

    </div>

</div>

</body>
</html>
